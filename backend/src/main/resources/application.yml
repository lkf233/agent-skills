server:
  port: 8080

spring:
  application:
    name: agent-chat-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/agent_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

rag:
  embedding:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: sk-0ebc9b053a9b4e269a6b9034a19d6b3a
    model: text-embedding-v4
    dimensions: 1024
    timeout-seconds: 3000
    batch-size: 10
