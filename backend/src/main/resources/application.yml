server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agent-chat-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://8.146.230.205:5432/agent_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true

rag:
  embedding:
    base-url: ${RAG_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${RAG_EMBEDDING_API_KEY:}
    model: ${RAG_EMBEDDING_MODEL:text-embedding-v4}
    dimensions: ${RAG_EMBEDDING_DIMENSIONS:1024}
    timeout-seconds: ${RAG_EMBEDDING_TIMEOUT_SECONDS:3000}
    batch-size: ${RAG_EMBEDDING_BATCH_SIZE:10}
